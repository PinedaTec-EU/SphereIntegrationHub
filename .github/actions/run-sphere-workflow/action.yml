name: Run SphereIntegrationHub Workflow
description: >
  Installs or updates the SphereIntegrationHub CLI tool (SphereIntegrationHub.Tool)
  and runs the specified workflow file.

inputs:
  workflow-path:
    description: Path to the .workflow file to execute (relative to the repo root).
    required: true

  cli-args:
    description: >
      Additional arguments to pass to the `sih` command, e.g.
      `--env prod --catalog ./api-catalog.json --varsfile ./prod.wfvars`.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Restore dotnet tools
      shell: bash
      run: dotnet tool restore

    - name: Run workflow
      shell: bash
      run: >
        dotnet tool run sih
        --workflow "${{ inputs.workflow-path }}"
        ${{ inputs.cli-args }}
