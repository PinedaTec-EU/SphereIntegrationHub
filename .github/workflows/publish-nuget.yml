name: Publish NuGet

on:
  push:
    tags:
      - "deploy/global/[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/dotnet-publish-nuget.yml
    with:
      solution_file: SphereIntegrationHub.slnx
      tag_prefix: deploy/global/
      test_projects: |
        tests/SphereIntegrationHub.Tests/SphereIntegrationHub.Tests.csproj
        tests/SphereIntegrationHub.MCP.Tests/SphereIntegrationHub.MCP.Tests.csproj
      pack_projects: |
        src/SphereIntegrationHub.cli/SphereIntegrationHub.cli.csproj
        src/SphereIntegrationHub.MCP/SphereIntegrationHub.MCP.csproj
    secrets:
      nuget_api_key: ${{ secrets.NUGET_API_KEY }}
