name: Publish NuGet

on:
  push:
    tags:
      - "deploy/global/[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/dotnet-publish-nuget.yml
    with:
      solution_file: SphereIntegrationHub.slnx
      tag_prefix: deploy/global/
      test_projects: |
        tests/SphereIntegrationHub.Tests.Unit/SphereIntegrationHub.Tests.Unit.csproj
        tests/SphereIntegrationHub.IaC.Tests.Unit/SphereIntegrationHub.IaC.Tests.Unit.csproj
      pack_projects: |
        src/SphereIntegrationHub.DependencyInjection/SphereIntegrationHub.DependencyInjection.csproj
        src/SphereIntegrationHub.IaC.Cli/SphereIntegrationHub.IaC.Cli.csproj
    secrets:
      nuget_api_key: ${{ secrets.NUGET_API_KEY }}
