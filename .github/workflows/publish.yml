name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # para crear el GitHub Release
  id-token: write   # para npm provenance

jobs:
  # ─── Build binaries por plataforma ────────────────────────────────────────
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: sphere-integration-hub-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            archive: sphere-integration-hub-linux-arm64.tar.gz
          - os: macos-13
            rid: osx-x64
            archive: sphere-integration-hub-darwin-x64.tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive: sphere-integration-hub-darwin-arm64.tar.gz
          - os: windows-latest
            rid: win-x64
            archive: sphere-integration-hub-win32-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish CLI
        shell: bash
        run: |
          dotnet publish src/SphereIntegrationHub.cli/SphereIntegrationHub.cli.csproj \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -c Release \
            -o publish/cli

      - name: Publish MCP
        shell: bash
        run: |
          dotnet publish src/SphereIntegrationHub.MCP/SphereIntegrationHub.MCP.csproj \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -c Release \
            -o publish/mcp

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          # Copiamos ambos binarios a un staging dir para evitar rutas relativas en tar
          mkdir -p staging
          cp publish/cli/sih   staging/sih
          cp publish/mcp/sih-mcp staging/sih-mcp
          tar czf dist/${{ matrix.archive }} -C staging sih sih-mcp

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish/cli/sih.exe, publish/mcp/sih-mcp.exe -DestinationPath dist/${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          retention-days: 1

  # ─── Crear GitHub Release y publicar npm ──────────────────────────────────
  release:
    name: Release & Publish npm
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.value }}"
          generate_release_notes: true
          files: dist/*

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version into package.json
        run: |
          cd npm/sphere-integration-hub
          npm version ${{ steps.version.outputs.value }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: cd npm/sphere-integration-hub && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM }}
