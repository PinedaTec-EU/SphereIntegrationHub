name: Publish

on:
  push:
    tags:
      - 'v*.*.*.*'

permissions:
  contents: write   # para crear el GitHub Release
  id-token: write   # para npm provenance

jobs:
  # ─── Build todas las plataformas desde el self-hosted runner ─────────────────
  # .NET soporta cross-compilation: un solo runner genera binarios para todos los RIDs.
  build-and-release:
    name: Build & Release
    runs-on: [self-hosted, primary]

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ─── Compilar CLI + MCP para cada RID ──────────────────────────────────
      - name: Publish all platforms
        shell: bash
        run: |
          set -euo pipefail

          RIDS=(linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64)

          for rid in "${RIDS[@]}"; do
            echo "▸ Compilando $rid..."

            dotnet publish src/SphereIntegrationHub.cli/SphereIntegrationHub.cli.csproj \
              -r "$rid" --self-contained true \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              -c Release -o "publish/$rid/cli" \
              --nologo -v quiet

            dotnet publish src/SphereIntegrationHub.MCP/SphereIntegrationHub.MCP.csproj \
              -r "$rid" --self-contained true \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              -c Release -o "publish/$rid/mcp" \
              --nologo -v quiet
          done

      # ─── Empaquetar ────────────────────────────────────────────────────────
      - name: Create archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Unix: tar.gz
          for entry in \
            "linux-x64:linux:x64" \
            "linux-arm64:linux:arm64" \
            "osx-x64:darwin:x64" \
            "osx-arm64:darwin:arm64"
          do
            rid="${entry%%:*}"
            rest="${entry#*:}"
            npm_os="${rest%%:*}"
            npm_arch="${rest##*:}"
            archive="sphere-integration-hub-${npm_os}-${npm_arch}.tar.gz"

            mkdir -p "staging/$rid"
            cp "publish/$rid/cli/sih"     "staging/$rid/sih"
            cp "publish/$rid/mcp/sih-mcp" "staging/$rid/sih-mcp"
            tar czf "dist/$archive" -C "staging/$rid" sih sih-mcp
            echo "  → dist/$archive"
          done

          # Windows: zip (comando disponible en macOS/Linux)
          mkdir -p staging/win-x64
          cp publish/win-x64/cli/sih.exe     staging/win-x64/sih.exe
          cp publish/win-x64/mcp/sih-mcp.exe staging/win-x64/sih-mcp.exe
          zip -j dist/sphere-integration-hub-win32-x64.zip \
            staging/win-x64/sih.exe \
            staging/win-x64/sih-mcp.exe
          echo "  → dist/sphere-integration-hub-win32-x64.zip"

      # ─── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.value }}"
          generate_release_notes: true
          files: dist/*

      # ─── Publicar npm ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version into package.json
        run: |
          cd npm/sphere-integration-hub
          npm version ${{ steps.version.outputs.value }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: cd npm/sphere-integration-hub && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM }}
