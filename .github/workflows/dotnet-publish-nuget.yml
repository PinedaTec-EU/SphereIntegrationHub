name: dotnet-publish-nuget

on:
  workflow_call:
    inputs:
      solution_file:
        description: "Ruta al archivo de solución .NET"
        type: string
        required: true
      tag_prefix:
        description: "Prefijo del tag desde el que se extrae la versión"
        type: string
        required: false
        default: "deploy/global/"
      test_projects:
        description: "Lista separada por saltos de línea de proyectos de test a ejecutar"
        type: string
        required: false
        default: ""
      pack_projects:
        description: "Lista separada por saltos de línea de proyectos a empaquetar"
        type: string
        required: true
      nuget_source:
        description: "Feed NuGet destino"
        type: string
        required: false
        default: "https://api.nuget.org/v3/index.json"
      output_directory:
        description: "Directorio de salida para paquetes"
        type: string
        required: false
        default: "nupkgs"
    secrets:
      nuget_api_key:
        description: "API key del feed NuGet"
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: "**/*.csproj"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          PREFIX="${{ inputs.tag_prefix }}"
          if [[ "${GITHUB_REF_NAME}" != ${PREFIX}* ]]; then
            echo "Unexpected tag format: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#${PREFIX}}"
          if [[ -z "${VERSION}" ]]; then
            echo "Unable to extract version from tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore "${{ inputs.solution_file }}"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          dotnet build "${{ inputs.solution_file }}" \
            -c Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.version }}

      - name: Run tests
        if: ${{ inputs.test_projects != '' }}
        shell: bash
        run: |
          set -euo pipefail

          dotnet test \
            -c Release \
            --logger "console;verbosity=normal"
          <<'EOF'
          EOF

      - name: Pack
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_DIR="${{ inputs.output_directory }}"
          mkdir -p "$OUTPUT_DIR"

          while IFS= read -r project; do
            project="$(echo "$project" | xargs)"
            [ -n "$project" ] || continue

            dotnet pack "$project" \
              -c Release \
              --no-restore \
              -p:Version=$VERSION \
              --output "$OUTPUT_DIR"
          done <<'EOF'
          ${{ inputs.pack_projects }}
          EOF

      - name: List packages
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "${{ inputs.output_directory }}/"

      - name: Push to NuGet
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget push "${{ inputs.output_directory }}/*.nupkg" \
            --api-key "${{ secrets.nuget_api_key }}" \
            --source "${{ inputs.nuget_source }}" \
            --skip-duplicate
